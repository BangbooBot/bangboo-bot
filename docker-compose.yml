services:
  db:
    image: postgres:18.3
    container_name: bangboo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bangboo
      POSTGRES_PASSWORD: bangboo
      POSTGRES_DB: bangboo

  pgadmin:
    image: dpage/pgadmin4
    container_name: bangboo-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bangboo.com
      PGADMIN_DEFAULT_PASSWORD: bangboo
    depends_on:
      - db

  redis:
    image: redis:latest
    container_name: bangboo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    environment:
      - INSIGHT_WEB_PORT=5540

  insight:
    image: redis/redisinsight:latest
    container_name: bangboo-redisinsight
    ports:
      - "5540:5540"
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  redisinsight_data:
